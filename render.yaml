# Render.com Blueprint Specification
# Use this to deploy the unified Web Service (FastAPI backend hosting the built React frontend)
services:
  - type: web
    name: vbcua-analyser
    env: docker
    # Service settings
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false
        description: "MongoDB Connection URI (e.g. mongodb+srv://username:password@cluster.mongodb.net/database)"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: JWT_SECRET
        sync: false
        description: "Secret key for signing JWT auth tokens"
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
        description: "Email address for SMTP OTP mail delivery"
      - key: SMTP_PASS
        sync: false
        description: "App Password for SMTP mail delivery"
      - key: EMAIL_FROM
        sync: false
        description: "Sender name and email (e.g. VBCUA <your_email@gmail.com>)"
      - key: GEMINI_API_KEY
        sync: false
        description: "Optional Google Gemini API Key"
      - key: OPENAI_API_KEY
        sync: false
        description: "Optional OpenAI API Key"
